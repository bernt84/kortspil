<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tetris">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Crect x='16' y='16' width='14' height='14' fill='%23e8c468'/%3E%3Crect x='30' y='16' width='14' height='14' fill='%237fb7ff'/%3E%3Crect x='30' y='30' width='14' height='14' fill='%23e88'/%3E%3C/svg%3E">
<title>Tetris</title>
<style>
  :root{
    --felt:#0a3d2e; --felt-2:#0d4a37; --felt-line:#10573f;
    --gold:#e8c468; --gold-dim:#b89640;
    --cream:#f3ead6; --ink:#0a2018;
    --shadow:rgba(0,0,0,.4);
    --grid:#08251b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;overflow:hidden;height:100%;}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);
    color:var(--cream);height:100vh;height:100dvh;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) 8px calc(8px + env(safe-area-inset-bottom));
  }
  .topbar{display:flex;align-items:center;gap:10px;max-width:480px;margin:0 auto;width:100%;padding:8px 2px 4px;}
  .topbar h1{flex:1;font-size:18px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:7px 10px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;}
  .btn:active{transform:translateY(1px);}
  a.btn{text-decoration:none;display:inline-block;}

  .stage{flex:1;display:flex;gap:10px;max-width:480px;margin:6px auto 0;width:100%;min-height:0;}
  canvas#board{background:var(--grid);border:2px solid var(--felt-line);border-radius:8px;display:block;height:100%;}
  .side{display:flex;flex-direction:column;gap:10px;justify-content:flex-start;min-width:74px;}
  .box{background:var(--felt-2);border:1px solid var(--felt-line);border-radius:10px;padding:8px;text-align:center;}
  .box .lbl{font-size:10px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;}
  .box .val{font-size:22px;color:var(--gold);font-weight:bold;line-height:1.1;margin-top:2px;}
  canvas#next{background:var(--grid);border-radius:6px;margin-top:4px;}

  .controls{max-width:480px;margin:8px auto 0;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .controls button{font-family:inherit;font-size:22px;padding:16px 0;border-radius:11px;border:1px solid var(--felt-line);background:var(--felt-2);color:var(--cream);cursor:pointer;}
  .controls button:active{background:var(--felt-line);}
  .controls .wide{grid-column:span 1;}

  .overlay{position:fixed;inset:0;background:rgba(5,25,18,.92);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .overlay.show{display:flex;}
  .overlay h2{font-size:30px;margin:0 0 8px;color:var(--gold);font-variant:small-caps;}
  .overlay p{margin:0 0 18px;}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn" href="index.html">‹ Menu</a>
  <h1>Tetris</h1>
  <button class="btn" id="newBtn">Nyt</button>
  <button class="btn" id="pauseBtn">⏸</button>
</div>

<div class="stage">
  <canvas id="board"></canvas>
  <div class="side">
    <div class="box"><div class="lbl">Point</div><div class="val" id="score">0</div></div>
    <div class="box"><div class="lbl">Linjer</div><div class="val" id="lines">0</div></div>
    <div class="box"><div class="lbl">Niveau</div><div class="val" id="level">1</div></div>
    <div class="box"><div class="lbl">Næste</div><canvas id="next" width="60" height="60"></canvas></div>
  </div>
</div>

<div class="controls">
  <button id="left">◀</button>
  <button id="rotate">⟳</button>
  <button id="right">▶</button>
  <button id="drop">⤓</button>
</div>

<div class="overlay" id="overlay">
  <h2 id="ovTitle">Game over</h2>
  <p id="ovText"></p>
  <button class="btn solid" id="ovNew" style="font-size:17px;padding:13px 22px;">Spil igen</button>
</div>

<script>
const $=id=>document.getElementById(id);
function saveHigh(key,value,lower){try{const hs=JSON.parse(localStorage.getItem('spil_highscores'))||{};const cur=hs[key];if(cur===undefined||(lower?value<cur:value>cur)){hs[key]=value;localStorage.setItem('spil_highscores',JSON.stringify(hs));}}catch(e){}}
const COLS=10, ROWS=20;
const COLORS={I:'#5fd0d0',O:'#e8c468',T:'#b69cff',S:'#74d39a',Z:'#e88',J:'#7fb7ff',L:'#e8a85f'};
const SHAPES={
  I:[[0,1],[1,1],[2,1],[3,1]],
  O:[[1,0],[2,0],[1,1],[2,1]],
  T:[[1,0],[0,1],[1,1],[2,1]],
  S:[[1,0],[2,0],[0,1],[1,1]],
  Z:[[0,0],[1,0],[1,1],[2,1]],
  J:[[0,0],[0,1],[1,1],[2,1]],
  L:[[2,0],[0,1],[1,1],[2,1]],
};
const board=$('board'), ctx=board.getContext('2d');
const nextCv=$('next'), nctx=nextCv.getContext('2d');
let grid, cur, nextPiece, cell, score, lines, level, dropTimer, lastDrop, paused, over, bag=[];

function resize(){
  const stage=document.querySelector('.stage');
  const availH=stage.clientHeight;
  const availW=stage.clientWidth-84; // side panel
  cell=Math.floor(Math.min(availW/COLS, availH/ROWS));
  board.width=cell*COLS;board.height=cell*ROWS;
  draw();
}
function newBag(){const k=Object.keys(SHAPES);for(let i=k.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[k[i],k[j]]=[k[j],k[i]];}return k;}
function nextType(){if(!bag.length)bag=newBag();return bag.pop();}

function spawn(){
  const type=nextPiece||nextType();
  nextPiece=nextType();
  cur={type,cells:SHAPES[type].map(c=>[...c]),x:3,y:0};
  if(collide(cur.cells,cur.x,cur.y)){gameOver();}
  drawNext();
}
function collide(cells,ox,oy){
  return cells.some(([x,y])=>{
    const nx=x+ox,ny=y+oy;
    return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&grid[ny][nx]);
  });
}
function merge(){cur.cells.forEach(([x,y])=>{if(y+cur.y>=0)grid[y+cur.y][x+cur.x]=cur.type;});}
function rotate(){
  // rotate around piece center (O doesn't rotate)
  if(cur.type==='O')return;
  const cx=1,cy=1;
  const rot=cur.cells.map(([x,y])=>[cx-(y-cy),cy+(x-cx)]);
  if(!collide(rot,cur.x,cur.y))cur.cells=rot;
  else if(!collide(rot,cur.x+1,cur.y)){cur.x++;cur.cells=rot;}
  else if(!collide(rot,cur.x-1,cur.y)){cur.x--;cur.cells=rot;}
  draw();
}
function move(dx){if(!collide(cur.cells,cur.x+dx,cur.y)){cur.x+=dx;draw();}}
function softDrop(){
  if(!collide(cur.cells,cur.x,cur.y+1)){cur.y++;draw();return true;}
  lockPiece();return false;
}
function hardDrop(){
  while(!collide(cur.cells,cur.x,cur.y+1)){cur.y++;score+=2;}
  lockPiece();
}
function lockPiece(){
  merge();clearLines();spawn();updHud();draw();saveGame();
}
function clearLines(){
  let cleared=0;
  for(let y=ROWS-1;y>=0;y--){
    if(grid[y].every(c=>c)){grid.splice(y,1);grid.unshift(Array(COLS).fill(0));cleared++;y++;}
  }
  if(cleared){
    lines+=cleared;
    score+=[0,40,100,300,1200][cleared]*level;
    level=1+Math.floor(lines/10);
  }
}
function updHud(){$('score').textContent=score;$('lines').textContent=lines;$('level').textContent=level;}

function draw(){
  ctx.clearRect(0,0,board.width,board.height);
  // grid cells
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(grid[y][x])drawCell(ctx,x,y,COLORS[grid[y][x]]);
  }
  // ghost
  if(cur&&!over){
    let gy=cur.y;while(!collide(cur.cells,cur.x,gy+1))gy++;
    cur.cells.forEach(([x,y])=>{if(gy+y>=0)drawCell(ctx,x+cur.x,gy+y,'rgba(255,255,255,.12)');});
    cur.cells.forEach(([x,y])=>{if(cur.y+y>=0)drawCell(ctx,x+cur.x,y+cur.y,COLORS[cur.type]);});
  }
}
function drawCell(c,x,y,color){
  const px=x*cell,py=y*cell;
  c.fillStyle=color;
  c.fillRect(px+1,py+1,cell-2,cell-2);
  c.fillStyle='rgba(255,255,255,.18)';
  c.fillRect(px+1,py+1,cell-2,3);
}
function drawNext(){
  nctx.clearRect(0,0,60,60);
  const cells=SHAPES[nextPiece];
  const xs=cells.map(c=>c[0]),ys=cells.map(c=>c[1]);
  const w=Math.max(...xs)-Math.min(...xs)+1,h=Math.max(...ys)-Math.min(...ys)+1;
  const cs=13,offx=(60-w*cs)/2-Math.min(...xs)*cs,offy=(60-h*cs)/2-Math.min(...ys)*cs;
  cells.forEach(([x,y])=>{
    nctx.fillStyle=COLORS[nextPiece];
    nctx.fillRect(offx+x*cs+1,offy+y*cs+1,cs-2,cs-2);
  });
}

function tick(ts){
  if(paused||over){lastDrop=ts;requestAnimationFrame(tick);return;}
  if(!lastDrop)lastDrop=ts;
  const speed=Math.max(80,650-(level-1)*55);
  if(ts-lastDrop>speed){softDrop();lastDrop=ts;}
  requestAnimationFrame(tick);
}

function saveGame(){
  try{
    if(over){localStorage.removeItem('tetris_save');return;}
    localStorage.setItem('tetris_save',JSON.stringify({grid,cur,nextPiece,score,lines,level,bag}));
  }catch(e){}
}
function loadGame(){
  try{
    const s=JSON.parse(localStorage.getItem('tetris_save'));
    if(!s||!s.grid||!s.cur)return false;
    grid=s.grid;cur=s.cur;nextPiece=s.nextPiece;score=s.score;lines=s.lines;level=s.level;bag=s.bag||[];
    return true;
  }catch(e){return false;}
}
function start(resume){
  if(resume&&loadGame()){
    over=false;paused=false;
    $('overlay').classList.remove('show');$('pauseBtn').textContent='⏸';
    updHud();resize();drawNext();
    lastDrop=0;requestAnimationFrame(tick);return;
  }
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0;lines=0;level=1;over=false;paused=false;bag=[];nextPiece=null;
  $('overlay').classList.remove('show');$('pauseBtn').textContent='⏸';
  spawn();updHud();resize();
  lastDrop=0;requestAnimationFrame(tick);
  saveGame();
}
function gameOver(){
  over=true;
  localStorage.removeItem('tetris_save');
  saveHigh('tetris',score,false);
  $('ovTitle').textContent='Game over';
  $('ovText').textContent=`${score} point · ${lines} linjer · niveau ${level}`;
  $('overlay').classList.add('show');
}

/* controls */
$('left').onclick=()=>!over&&!paused&&move(-1);
$('right').onclick=()=>!over&&!paused&&move(1);
$('rotate').onclick=()=>!over&&!paused&&rotate();
$('drop').onclick=()=>!over&&!paused&&hardDrop();
$('pauseBtn').onclick=()=>{if(over)return;paused=!paused;$('pauseBtn').textContent=paused?'▶':'⏸';};
$('newBtn').onclick=()=>{localStorage.removeItem('tetris_save');start(false);};
$('ovNew').onclick=()=>{localStorage.removeItem('tetris_save');start(false);};
document.addEventListener('keydown',e=>{
  if(over)return;
  if(e.key==='ArrowLeft')move(-1);
  else if(e.key==='ArrowRight')move(1);
  else if(e.key==='ArrowUp')rotate();
  else if(e.key==='ArrowDown')softDrop();
  else if(e.key===' '){e.preventDefault();hardDrop();}
});
window.addEventListener('resize',resize);

start(true);
</script>
</body>
</html>
