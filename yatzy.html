<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yatzy">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Crect x='20' y='20' width='24' height='24' rx='5' fill='%23f7f2e6'/%3E%3Ccircle cx='27' cy='27' r='3' fill='%230a2018'/%3E%3Ccircle cx='37' cy='37' r='3' fill='%230a2018'/%3E%3Ccircle cx='37' cy='27' r='3' fill='%230a2018'/%3E%3Ccircle cx='27' cy='37' r='3' fill='%230a2018'/%3E%3C/svg%3E">
<title>Yatzy</title>
<style>
  :root{
    --felt:#0a3d2e; --felt-2:#0d4a37; --felt-line:#10573f;
    --gold:#e8c468; --gold-dim:#b89640;
    --cream:#f3ead6; --ink:#0a2018;
    --red:#c0392b; --hit:#2e7d56;
    --die:#f7f2e6; --pip:#0a2018;
    --shadow:rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);
    color:var(--cream);min-height:100vh;min-height:100dvh;
    padding:env(safe-area-inset-top) 10px 14px;
  }
  .topbar{display:flex;align-items:center;gap:10px;max-width:600px;margin:0 auto;padding:10px 2px 6px;}
  .topbar h1{flex:1;font-size:20px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:8px 11px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;box-shadow:0 2px 0 var(--gold-dim);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.45;}
  a.btn{text-decoration:none;display:inline-block;}

  .setup{max-width:600px;margin:14px auto 0;}
  .panel{background:var(--felt-2);border:1px solid var(--felt-line);border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 6px 18px var(--shadow);}
  label{display:block;font-size:13px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:6px;}
  .player-add{display:flex;gap:8px;}
  .player-add input{flex:1;font-family:inherit;font-size:17px;padding:11px 12px;border-radius:9px;border:1px solid var(--felt-line);background:#093427;color:var(--cream);}
  ul.list{list-style:none;margin:10px 0 0;padding:0;}
  ul.list li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--felt-line);}
  ul.list li:last-child{border-bottom:none;}
  ul.list .name{flex:1;font-size:18px;}
  .pill{background:#093427;border:1px solid var(--felt-line);color:var(--gold-dim);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
  .btn.block{width:100%;}.btn.big{font-size:19px;padding:15px;}

  /* game */
  .turnbar{max-width:600px;margin:12px auto 0;display:flex;justify-content:space-between;align-items:center;background:var(--felt-2);border:1px solid var(--felt-line);border-radius:12px;padding:12px 16px;}
  .turnbar .who{font-size:20px;color:var(--gold);font-variant:small-caps;}
  .turnbar .rolls{font-size:12px;color:var(--gold-dim);letter-spacing:1px;}

  .dice{max-width:600px;margin:16px auto 0;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .die{
    width:58px;height:58px;border-radius:12px;background:var(--die);
    box-shadow:0 3px 6px var(--shadow);cursor:pointer;position:relative;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    padding:9px;border:2px solid transparent;
  }
  .die.held{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,196,104,.35);transform:translateY(2px);}
  .die.rolling{animation:shake .5s;}
  @keyframes shake{0%,100%{transform:none}25%{transform:translateY(-6px) rotate(-8deg)}75%{transform:translateY(-3px) rotate(8deg)}}
  .die .pip{width:10px;height:10px;border-radius:50%;background:var(--pip);align-self:center;justify-self:center;}
  .die .held-lbl{position:absolute;bottom:-16px;left:0;right:0;text-align:center;font-size:10px;color:var(--gold-dim);letter-spacing:1px;}

  .roll-area{max-width:600px;margin:26px auto 0;text-align:center;}
  .roll-area .btn{font-size:18px;padding:14px 28px;}
  .roll-hint{font-size:12px;color:var(--gold-dim);margin-top:8px;}

  .sheet{max-width:600px;margin:18px auto 0;background:var(--felt-2);border:1px solid var(--felt-line);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--felt-line);}
  th{font-size:10px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;font-weight:normal;}
  td.cat{text-align:left;padding-left:12px;font-size:14px;}
  td.cat small{color:var(--gold-dim);display:block;font-size:11px;}
  .scorecell{cursor:pointer;color:var(--gold);font-weight:bold;}
  .scorecell.empty{color:var(--gold-dim);font-weight:normal;}
  .scorecell.locked{color:var(--cream);cursor:default;}
  .scorecell.suggest{background:rgba(232,196,104,.14);border-radius:6px;}
  tr.section td{background:rgba(0,0,0,.15);font-size:11px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;text-align:left;padding-left:12px;}
  tr.sum td{font-weight:bold;}
  tr.sum td.cat{color:var(--cream);}
  .col-active{background:rgba(232,196,104,.06);}

  .overlay{position:fixed;inset:0;background:rgba(5,25,18,.94);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;}
  .overlay.show{display:flex;}
  .overlay h2{font-size:30px;margin:0 0 14px;color:var(--gold);font-variant:small-caps;}
  .final{list-style:none;padding:0;margin:0 0 20px;width:100%;max-width:340px;}
  .final li{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--felt-line);font-size:17px;}
  .final li.win{color:var(--gold);font-weight:bold;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:rgba(7,40,30,.96);border:1px solid var(--gold-dim);color:var(--cream);padding:10px 16px;border-radius:10px;font-size:14px;opacity:0;transition:.25s;z-index:70;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="topbar">
  <a class="btn" href="index.html">‹ Menu</a>
  <h1>Yatzy</h1>
  <button class="btn" id="newBtn">Nyt spil</button>
</div>

<!-- SETUP -->
<div class="setup" id="setup">
  <div class="panel">
    <label>Spillere</label>
    <div class="player-add">
      <input type="text" id="nameInput" placeholder="Navn" maxlength="14" autocomplete="off">
      <button class="btn" id="addBtn">Tilføj</button>
    </div>
    <ul class="list" id="playerList"></ul>
  </div>
  <button class="btn block big solid" id="startBtn">Start spil</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div class="turnbar">
    <div class="who" id="whoTurn">—</div>
    <div class="rolls" id="rollsLeft">3 kast tilbage</div>
  </div>

  <div class="dice" id="dice"></div>

  <div class="roll-area">
    <button class="btn solid" id="rollBtn">Kast</button>
    <div class="roll-hint" id="rollHint">Tryk en terning for at holde den</div>
  </div>

  <div class="sheet">
    <table id="sheet"></table>
  </div>
</div>

<div class="overlay" id="overlay">
  <h2>Slut!</h2>
  <ul class="final" id="finalList"></ul>
  <button class="btn solid" id="overNew" style="font-size:17px;padding:13px 22px;">Spil igen</button>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);

/* categories: standard Danish/Scandinavian Yatzy (5 dice) */
const CATS=[
  {key:'ones',name:'Enere',hint:'Sum af 1ere',sec:'up'},
  {key:'twos',name:'Toere',hint:'Sum af 2ere',sec:'up'},
  {key:'threes',name:'Treere',hint:'Sum af 3ere',sec:'up'},
  {key:'fours',name:'Firere',hint:'Sum af 4ere',sec:'up'},
  {key:'fives',name:'Femmere',hint:'Sum af 5ere',sec:'up'},
  {key:'sixes',name:'Seksere',hint:'Sum af 6ere',sec:'up'},
  {key:'pair',name:'Et par',hint:'2 ens, højest',sec:'low'},
  {key:'twopair',name:'To par',hint:'2 par',sec:'low'},
  {key:'three',name:'Tre ens',hint:'3 ens',sec:'low'},
  {key:'four',name:'Fire ens',hint:'4 ens',sec:'low'},
  {key:'smallstr',name:'Lille straight',hint:'1-2-3-4-5 = 15',sec:'low'},
  {key:'largestr',name:'Stor straight',hint:'2-3-4-5-6 = 20',sec:'low'},
  {key:'house',name:'Fuldt hus',hint:'3+2 ens',sec:'low'},
  {key:'chance',name:'Chance',hint:'Sum af alle',sec:'low'},
  {key:'yatzy',name:'Yatzy',hint:'5 ens = 50',sec:'low'},
];

let players=[], turn=0, dice=[1,1,1,1,1], held=[false,false,false,false,false], rollsLeft=3, rolled=false, scores=[], done=0;

/* ---- setup ---- */
function renderPlayers(){
  const ul=$('playerList');ul.innerHTML='';
  players.forEach((p,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="name">${esc(p)}</span><span class="pill" data-del="${i}">✕</span>`;
    ul.appendChild(li);
  });
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
$('addBtn').onclick=addP;
$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addP();});
function addP(){const n=$('nameInput').value.trim();if(!n)return;players.push(n);$('nameInput').value='';$('nameInput').focus();renderPlayers();}
$('playerList').addEventListener('click',e=>{const d=e.target.dataset.del;if(d!==undefined){players.splice(+d,1);renderPlayers();}});
$('startBtn').onclick=()=>{
  if(players.length<1){alert('Tilføj mindst én spiller.');return;}
  scores=players.map(()=>({}));
  turn=0;done=0;
  $('setup').classList.add('hidden');$('game').classList.remove('hidden');
  startTurn();
};

/* ---- turn ---- */
function startTurn(){
  rollsLeft=3;rolled=false;held=[false,false,false,false,false];
  dice=[1,1,1,1,1];
  $('whoTurn').textContent=players[turn];
  updRolls();renderDice();renderSheet();
  $('rollBtn').disabled=false;$('rollBtn').textContent='Kast';
}
function updRolls(){$('rollsLeft').textContent=rollsLeft+(rollsLeft===1?' kast tilbage':' kast tilbage');}

$('rollBtn').onclick=roll;
function roll(){
  if(rollsLeft<=0)return;
  rolled=true;
  const els=document.querySelectorAll('.die');
  for(let i=0;i<5;i++){
    if(!held[i]){dice[i]=1+Math.floor(Math.random()*6);els[i]&&els[i].classList.add('rolling');}
  }
  setTimeout(()=>document.querySelectorAll('.die').forEach(e=>e.classList.remove('rolling')),500);
  rollsLeft--;updRolls();renderDice();renderSheet();
  if(rollsLeft===0){$('rollBtn').disabled=true;$('rollHint').textContent='Vælg en kategori på tavlen';}
  else $('rollHint').textContent='Tryk en terning for at holde den · eller kast igen';
}
function renderDice(){
  const box=$('dice');box.innerHTML='';
  dice.forEach((v,i)=>{
    const d=document.createElement('div');
    d.className='die'+(held[i]?' held':'');
    d.innerHTML=pips(v)+(held[i]?'<div class="held-lbl">holdt</div>':'');
    d.onclick=()=>{if(!rolled)return; if(rollsLeft===0)return; held[i]=!held[i];renderDice();};
    box.appendChild(d);
  });
  if(!rolled)box.querySelectorAll('.die').forEach(d=>d.style.opacity=.55);
}
const PIPS={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function pips(v){
  let html='';
  for(let i=0;i<9;i++)html+=PIPS[v].includes(i)?'<span class="pip"></span>':'<span></span>';
  return html;
}

/* ---- scoring ---- */
function counts(){const c=[0,0,0,0,0,0,0];dice.forEach(d=>c[d]++);return c;}
function calc(key){
  const c=counts();const sum=dice.reduce((a,b)=>a+b,0);
  switch(key){
    case 'ones':return c[1]*1;case 'twos':return c[2]*2;case 'threes':return c[3]*3;
    case 'fours':return c[4]*4;case 'fives':return c[5]*5;case 'sixes':return c[6]*6;
    case 'pair':{for(let v=6;v>=1;v--)if(c[v]>=2)return v*2;return 0;}
    case 'twopair':{let p=[];for(let v=6;v>=1;v--)if(c[v]>=2)p.push(v);if(p.length>=2)return (p[0]+p[1])*2;return 0;}
    case 'three':{for(let v=6;v>=1;v--)if(c[v]>=3)return v*3;return 0;}
    case 'four':{for(let v=6;v>=1;v--)if(c[v]>=4)return v*4;return 0;}
    case 'smallstr':return (c[1]&&c[2]&&c[3]&&c[4]&&c[5])?15:0;
    case 'largestr':return (c[2]&&c[3]&&c[4]&&c[5]&&c[6])?20:0;
    case 'house':{let three=0,two=0;for(let v=1;v<=6;v++){if(c[v]>=3&&!three)three=v;else if(c[v]>=2&&!two)two=v;}
      // ensure distinct
      if(three&&two&&three!==two)return three*3+two*2;return 0;}
    case 'chance':return sum;
    case 'yatzy':{for(let v=1;v<=6;v++)if(c[v]===5)return 50;return 0;}
  }
  return 0;
}
function upperSum(pi){let s=0;['ones','twos','threes','fours','fives','sixes'].forEach(k=>{if(scores[pi][k]!=null)s+=scores[pi][k];});return s;}
function bonus(pi){return upperSum(pi)>=63?50:0;}
function total(pi){let s=bonus(pi);CATS.forEach(c=>{if(scores[pi][c.key]!=null)s+=scores[pi][c.key];});return s;}

function pick(key){
  if(!rolled){toast('Kast først');return;}
  if(scores[turn][key]!=null)return;
  scores[turn][key]=calc(key);
  done++;
  renderSheet();
  // next turn
  if(done>=players.length*CATS.length){finish();return;}
  turn=(turn+1)%players.length;
  startTurn();
}

function renderSheet(){
  const t=$('sheet');
  let html='<tr><th class="cat" style="text-align:left">Kategori</th>';
  players.forEach((p,i)=>html+=`<th class="${i===turn?'col-active':''}">${esc(p).slice(0,6)}</th>`);
  html+='</tr>';
  const drawRow=(c)=>{
    let row=`<tr><td class="cat">${c.name}<small>${c.hint}</small></td>`;
    players.forEach((p,pi)=>{
      const val=scores[pi][c.key];
      const active=pi===turn;
      if(val!=null){row+=`<td class="${active?'col-active':''}"><span class="scorecell locked">${val}</span></td>`;}
      else if(active&&rolled){
        const prev=calc(c.key);
        row+=`<td class="col-active"><span class="scorecell suggest" data-key="${c.key}">${prev}</span></td>`;
      }else{
        row+=`<td class="${active?'col-active':''}"><span class="scorecell empty">·</span></td>`;
      }
    });
    return row+'</tr>';
  };
  html+='<tr class="section"><td colspan="'+(players.length+1)+'">Øverste</td></tr>';
  CATS.filter(c=>c.sec==='up').forEach(c=>html+=drawRow(c));
  // upper sum + bonus
  html+='<tr class="sum"><td class="cat">Sum</td>';
  players.forEach((p,i)=>html+=`<td class="${i===turn?'col-active':''}">${upperSum(i)}</td>`);
  html+='</tr><tr class="sum"><td class="cat">Bonus<small>ved 63+</small></td>';
  players.forEach((p,i)=>html+=`<td class="${i===turn?'col-active':''}">${bonus(i)||'·'}</td>`);
  html+='</tr>';
  html+='<tr class="section"><td colspan="'+(players.length+1)+'">Nederste</td></tr>';
  CATS.filter(c=>c.sec==='low').forEach(c=>html+=drawRow(c));
  html+='<tr class="sum"><td class="cat">I alt</td>';
  players.forEach((p,i)=>html+=`<td class="${i===turn?'col-active':''}">${total(i)}</td>`);
  html+='</tr>';
  t.innerHTML=html;
  t.querySelectorAll('.scorecell.suggest').forEach(el=>el.onclick=()=>pick(el.dataset.key));
}

function finish(){
  const totals=players.map((p,i)=>({name:p,score:total(i)}));
  const max=Math.max(...totals.map(t=>t.score));
  totals.sort((a,b)=>b.score-a.score);
  $('finalList').innerHTML=totals.map(t=>`<li class="${t.score===max?'win':''}"><span>${t.score===max?'♛ ':''}${esc(t.name)}</span><span>${t.score}</span></li>`).join('');
  $('overlay').classList.add('show');
}

let toastT;
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1500);}

$('newBtn').onclick=()=>location.reload();
$('overNew').onclick=()=>location.reload();

renderPlayers();
</script>
</body>
</html>
