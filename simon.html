<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Simon">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a3d2e'/%3E%3Cpath d='M32 10 A22 22 0 0 1 54 32 L32 32 Z' fill='%2374d39a'/%3E%3Cpath d='M54 32 A22 22 0 0 1 32 54 L32 32 Z' fill='%23e8c468'/%3E%3Cpath d='M32 54 A22 22 0 0 1 10 32 L32 32 Z' fill='%23c0392b'/%3E%3Cpath d='M10 32 A22 22 0 0 1 32 10 L32 32 Z' fill='%237fb7ff'/%3E%3C/svg%3E">
<title>Simon</title>
<style>
  :root{--felt:#0a3d2e;--felt-2:#0d4a37;--felt-line:#10573f;--gold:#e8c468;--gold-dim:#b89640;--cream:#f3ead6;--ink:#0a2018;--shadow:rgba(0,0,0,.4);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;}
  body{font-family:"Georgia",serif;background:radial-gradient(ellipse at 50% 0%, var(--felt-2), var(--felt) 75%);color:var(--cream);min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) 12px 16px;}
  .wrap{max-width:420px;margin:0 auto;}
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 2px 6px;}
  .topbar h1{flex:1;font-size:20px;margin:0;color:var(--gold);font-variant:small-caps;letter-spacing:1px;}
  .topbar .stat{font-size:14px;color:var(--gold-dim);text-align:right;line-height:1.3;}
  .btn{font-family:inherit;font-size:14px;border:1px solid var(--felt-line);border-radius:9px;padding:8px 11px;cursor:pointer;background:transparent;color:var(--gold);}
  .btn.solid{background:var(--gold);color:var(--ink);border:none;font-weight:bold;box-shadow:0 2px 0 var(--gold-dim);}
  .btn:active{transform:translateY(1px);}
  a.btn{text-decoration:none;display:inline-block;}
  .board{position:relative;width:100%;max-width:340px;aspect-ratio:1;margin:18px auto 0;border-radius:50%;overflow:hidden;background:#08251b;box-shadow:0 8px 24px var(--shadow);}
  .pad{position:absolute;width:50%;height:50%;cursor:pointer;opacity:.5;transition:opacity .1s;}
  .pad.lit{opacity:1;}
  .green{top:0;left:0;background:#3a8a5e;border-bottom-right-radius:100%;}
  .green.lit{background:#7df0a8;}
  .yellow{top:0;right:0;background:#a8902f;border-bottom-left-radius:100%;}
  .yellow.lit{background:#ffe27a;}
  .red{bottom:0;left:0;background:#8e2f2f;border-top-right-radius:100%;}
  .red.lit{background:#ff7a6a;}
  .blue{bottom:0;right:0;background:#3a6a8e;border-top-left-radius:100%;}
  .blue.lit{background:#8fd0ff;}
  .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34%;height:34%;border-radius:50%;background:var(--felt);border:3px solid var(--felt-line);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:5;}
  .center .lvl{font-size:26px;color:var(--gold);font-weight:bold;}
  .center .lbl{font-size:9px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;}
  .controls{margin-top:18px;text-align:center;}
  .hint{text-align:center;font-size:13px;color:var(--gold-dim);margin-top:12px;min-height:18px;}
  .overlay{position:fixed;inset:0;background:rgba(5,25,18,.92);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .overlay.show{display:flex;}
  .overlay h2{font-size:30px;margin:0 0 8px;color:var(--gold);font-variant:small-caps;}
  .overlay p{margin:0 0 18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="btn" href="index.html">‹ Menu</a>
    <h1>Simon</h1>
    <div class="stat"><div id="best">bedste 0</div></div>
  </div>
  <div class="board" id="board">
    <div class="pad green" data-i="0"></div>
    <div class="pad yellow" data-i="1"></div>
    <div class="pad red" data-i="2"></div>
    <div class="pad blue" data-i="3"></div>
    <div class="center"><div class="lvl" id="lvl">0</div><div class="lbl">runde</div></div>
  </div>
  <div class="hint" id="hint">Tryk start og gentag mønstret</div>
  <div class="controls"><button class="btn solid" id="startBtn" style="font-size:17px;padding:13px 28px;">Start</button></div>
</div>
<div class="overlay" id="overlay"><h2>Forkert!</h2><p id="ovText"></p><button class="btn solid" id="ovNew" style="font-size:17px;padding:13px 22px;">Igen</button></div>

<script>
const $=id=>document.getElementById(id);
function saveHigh(key,value,lower){try{const hs=JSON.parse(localStorage.getItem('spil_highscores'))||{};const cur=hs[key];if(cur===undefined||(lower?value<cur:value>cur)){hs[key]=value;localStorage.setItem('spil_highscores',JSON.stringify(hs));}}catch(e){}}
const pads=[...document.querySelectorAll('.pad')];
const TONES=[330,415,494,587];
let seq,inputIdx,playing,acceptingInput,best=+(localStorage.getItem('simonBest')||0);
let audioCtx;
$('best').textContent='bedste '+best;

function tone(i,dur=300){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=TONES[i];o.type='sine';o.connect(g);g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.25,audioCtx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur/1000);
    o.start();o.stop(audioCtx.currentTime+dur/1000);
  }catch(e){}
}
function flash(i,dur=300){pads[i].classList.add('lit');tone(i,dur);setTimeout(()=>pads[i].classList.remove('lit'),dur);}

function start(){
  seq=[];inputIdx=0;playing=true;acceptingInput=false;
  $('overlay').classList.remove('show');
  nextRound();
}
function nextRound(){
  seq.push(Math.floor(Math.random()*4));
  $('lvl').textContent=seq.length;
  inputIdx=0;acceptingInput=false;
  $('hint').textContent='Se godt efter…';
  playSeq();
}
function playSeq(){
  let i=0;
  const speed=Math.max(280,560-seq.length*15);
  const t=setInterval(()=>{
    if(i>=seq.length){clearInterval(t);acceptingInput=true;$('hint').textContent='Din tur';return;}
    flash(seq[i],speed*0.6);i++;
  },speed);
}
pads.forEach(p=>p.onclick=()=>{
  if(!acceptingInput)return;
  const i=+p.dataset.i;flash(i,200);
  if(i===seq[inputIdx]){
    inputIdx++;
    if(inputIdx===seq.length){acceptingInput=false;$('hint').textContent='Flot!';setTimeout(nextRound,700);}
  }else{
    fail();
  }
});
function fail(){
  acceptingInput=false;playing=false;
  const score=seq.length-1;
  if(score>best){best=score;localStorage.setItem('simonBest',best);saveHigh('simon',best,false);$('best').textContent='bedste '+best;}
  $('ovText').textContent=`Du nåede runde ${seq.length}`;
  $('overlay').classList.add('show');
}
$('startBtn').onclick=start;$('ovNew').onclick=start;
</script>
</body>
</html>
